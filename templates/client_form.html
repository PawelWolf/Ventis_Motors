<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/media/logo.png" type="image/x-icon">
    <title>Ventis Motors - Car Configurator</title>
    <link rel="stylesheet" href="/media/client_style.css">
</head>
<body>
    <div class="main_page">
        <h1>CHOOSE YOUR FUTURE CAR SPECIFICATION</h1>
        <form method="post" class="car_config_form">
            <div class="grid">
                <!-- Lewa kolumna, góra -->
                <div class="spec-group body-group">
                    <label for="body-select">Body:</label>
                    <div class="select-wrapper">
                        <select name="body" id="body-select">
                            <option value="hatchback">Hatchback</option>
                            <option value="sedan">Sedan</option>
                            <option value="kombi">Combi</option>
                            <option value="suv">SUV</option>
                        </select>
                    </div>
                </div>

                <!-- Prawa kolumna, góra -->
                <div class="spec-group engine-group">
                    <label for="fuel-select">Engine Fuel Type:</label>
                    <div class="select-wrapper">
                        <select name="fuel_type" id="fuel-select">
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>
                </div>

                <!-- Centrum siatki -->
                <div class="ventis-logo">
                    <div class="logo-container">
                        <img src="/media/logo.png" alt="Ventis Motors Logo">
                    </div>
                </div>

                <!-- Lewa kolumna, dół (Wskakuje w wolne miejsce drivearea!) -->
                <div class="spec-group drive-group">
                    <label for="employee-select">Sales Representative:</label>
                    <div class="select-wrapper">
                        <select name="employee_id" id="employee-select" required>
                            {% for emp in employees %}
                                <option value="{{ emp.EmployeeID }}">{{ emp.FirstName }} {{ emp.LastName }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Panel przycisków akcji -->
                <div class="buy-back-buttons">
                    <button type="submit" class="buy-button">Buy</button>
                    <a href="/" class="back-button">Back</a>
                </div>

                <!-- Prawa kolumna, dół -->
                <div class="spec-group colour-group">
                    <label for="colour-select">Colour:</label>
                    <div class="select-wrapper">
                        <select name="colour" id="colour-select">
                            <option value="blue">Blue</option>
                            <option value="red">Red</option>
                            <option value="white">White</option>
                            <option value="black">Black</option>
                        </select>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
