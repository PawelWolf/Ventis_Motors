version: 2.1

jobs:
  build_and_deploy:
    docker:
      - image: pawelwolf/ventis2db:v3
        auth:
          username: $DOCKER_USERNAME
          password: $DOCKER_PASSWORD
    steps:
      - checkout
      
      - run:
          name: Sprawdzanie jakosci kodu (Linter)
          command: |
            make lint || true

      - setup_remote_docker:
          version: default

      - run:
          name: Budowanie nowego obrazu Docker
          command: |
            make docker_build

      - run:
          name: Wypychanie obrazu na Docker Hub
          command: |
            make docker_push

workflows:
  version: 2
  weryfikacja_i_wypychanie:
    jobs:
      - build_and_deploy